{% extends "base.html" %}

{% block content %}

<h1>Upload Your Resume 📄</h1>

<p>
    Upload your resume in PDF format to get personalized job recommendations.
</p>

<form action="/upload" method="POST" enctype="multipart/form-data">

    <input
        type="file"
        name="resume"
        accept=".pdf"
        required
    >

    <br><br>

    <button type="submit">
        Upload Resume
    </button>

</form>

{% endblock %}
